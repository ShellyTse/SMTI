<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMTI · 你在感情里是哪种生物</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f2ed;--surface:#ffffff;--surface2:#f9f7f4;
  --border:#e2ddd6;--border2:#d4cec5;
  --text:#1a1714;--text-muted:#7a7068;--text-dim:#b0a89e;
  --accent-s:#c8922a;--accent-m:#4a8fc2;
  --accent-s-light:rgba(200,146,42,0.1);--accent-m-light:rgba(74,143,194,0.1);
  --accent-s-mid:rgba(200,146,42,0.25);
  --radius:20px;--radius-sm:12px;
  --shadow:0 2px 16px rgba(0,0,0,0.06);--shadow-md:0 4px 32px rgba(0,0,0,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Serif SC',serif;min-height:100vh;overflow-x:hidden;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

/* INTRO */
#intro{align-items:center;justify-content:center;padding:48px 24px;position:relative;}
.intro-deco{position:absolute;top:0;left:0;right:0;height:320px;background:linear-gradient(160deg,rgba(200,146,42,0.08) 0%,rgba(74,143,194,0.08) 100%);border-radius:0 0 60% 60%/0 0 40px 40px;}
.intro-content{position:relative;max-width:480px;width:100%;text-align:center;}
.badge{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.25em;color:var(--text-muted);border:1.5px solid var(--border2);padding:6px 18px;border-radius:100px;margin-bottom:32px;text-transform:uppercase;background:var(--surface);}
.intro-title{font-size:clamp(64px,18vw,100px);font-weight:900;letter-spacing:-.03em;line-height:.88;margin-bottom:6px;}
.title-s{color:var(--accent-s);}.title-m{color:var(--accent-m);}.title-ti{color:var(--text);opacity:.15;}
.intro-tagline{font-size:13px;color:var(--text-muted);letter-spacing:.06em;margin-bottom:40px;font-family:'Space Mono',monospace;}
.intro-card{background:var(--surface);border-radius:var(--radius);padding:28px;margin-bottom:24px;text-align:left;box-shadow:var(--shadow);border:1px solid var(--border);}
.intro-card p{font-size:15px;line-height:2;color:var(--text-muted);}
.intro-card strong{color:var(--text);}
.stats-row{display:flex;gap:1px;background:var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:28px;box-shadow:var(--shadow);}
.stat{flex:1;background:var(--surface);padding:18px 8px;text-align:center;}
.stat-num{font-family:'Space Mono',monospace;font-size:24px;color:var(--text);display:block;font-weight:700;}
.stat-label{font-size:11px;color:var(--text-dim);margin-top:4px;display:block;}
.btn-start{width:100%;padding:20px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);font-family:'Noto Serif SC',serif;font-size:17px;font-weight:700;cursor:pointer;transition:all .25s;letter-spacing:.04em;box-shadow:var(--shadow-md);}
.btn-start:hover{transform:translateY(-3px);box-shadow:0 16px 48px rgba(0,0,0,.18);}
.disclaimer{margin-top:16px;font-size:11px;color:var(--text-dim);font-family:'Space Mono',monospace;}

/* QUIZ - SCROLL MODE */
#quiz{padding:0;}
.quiz-top-bar{padding:20px 24px 16px;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border);}
.progress-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.progress-label{font-family:'Space Mono',monospace;font-size:11px;color:var(--text-muted);letter-spacing:.08em;}
.progress-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent-s),var(--accent-m));border-radius:2px;transition:width .45s cubic-bezier(.4,0,.2,1);}
.quiz-scroll-body{padding:32px 24px 16px;max-width:600px;margin:0 auto;width:100%;}
.q-block{margin-bottom:44px;padding-bottom:44px;border-bottom:1px solid var(--border);}
.q-block:last-of-type{border-bottom:none;}
.q-block.unanswered .q-num{color:var(--accent-s);}
.q-block.unanswered{background:rgba(200,146,42,0.03);border-radius:var(--radius-sm);padding:16px;margin-left:-16px;margin-right:-16px;}
.q-num{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:.25em;margin-bottom:14px;text-transform:uppercase;}
.q-text{font-size:clamp(15px,3.5vw,18px);line-height:1.85;color:var(--text);margin-bottom:24px;}
.options{display:flex;flex-direction:column;gap:10px;}
.option{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;text-align:left;font-family:'Noto Serif SC',serif;color:var(--text-muted);font-size:14px;line-height:1.65;width:100%;box-shadow:var(--shadow);}
.option:hover{border-color:var(--border2);color:var(--text);transform:translateX(4px);}
.option.selected{border-color:var(--accent-s);background:var(--accent-s-light);color:var(--text);}
.option.selected .opt-letter{color:var(--accent-s);}
.opt-letter{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-dim);min-width:16px;margin-top:2px;letter-spacing:.1em;}
.submit-zone{max-width:600px;margin:0 auto;width:100%;padding:8px 24px 60px;}
.submit-hint{font-size:12px;color:var(--accent-s);font-family:'Space Mono',monospace;text-align:center;margin-bottom:12px;min-height:20px;letter-spacing:.05em;}
.btn-submit{width:100%;padding:20px;background:var(--text);color:var(--bg);border:none;border-radius:var(--radius);font-family:'Noto Serif SC',serif;font-size:17px;font-weight:700;cursor:pointer;transition:all .25s;box-shadow:var(--shadow-md);}
.btn-submit:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 16px 48px rgba(0,0,0,.18);}
.btn-submit:disabled{background:var(--border2);color:var(--text-dim);cursor:not-allowed;box-shadow:none;}

/* LOADING */
#loading{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;gap:28px;background:var(--bg);}
#loading.active{display:flex;}
.loading-emoji{font-size:52px;animation:pulse 1.4s ease infinite;}
.loading-text{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.18em;color:var(--text-muted);text-transform:uppercase;}
.loading-bar{width:180px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.loading-fill{height:100%;background:linear-gradient(90deg,var(--accent-s),var(--accent-m));animation:loadAnim 2s ease forwards;}

/* RESULT */
#result{padding:32px 24px 80px;align-items:center;background:var(--bg);}
.result-inner{max-width:520px;width:100%;}
.result-eyebrow{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.25em;color:var(--text-dim);text-transform:uppercase;margin-bottom:20px;text-align:center;}
.result-hero{background:var(--surface);border-radius:28px;padding:40px 32px 32px;margin-bottom:16px;position:relative;overflow:hidden;box-shadow:var(--shadow-md);border:1px solid var(--border);text-align:center;}
.hero-gradient{position:absolute;top:0;left:0;right:0;height:200px;background:linear-gradient(160deg,var(--accent-s-light),var(--accent-m-light));border-radius:28px 28px 0 0;}
.hero-top-bar{position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--accent-s),var(--accent-m));border-radius:28px 28px 0 0;}
.hidden-badge{display:inline-block;background:linear-gradient(135deg,#fff8e8,#e8f4ff);border:1px solid var(--accent-s-mid);border-radius:100px;padding:5px 16px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.18em;color:var(--accent-s);margin-bottom:16px;position:relative;}
.char-illus{position:relative;width:160px;height:160px;margin:0 auto 24px;animation:floatUp 3s ease-in-out infinite;}
.char-illus svg{width:100%;height:100%;filter:drop-shadow(0 8px 24px rgba(0,0,0,.12));}
.result-camp-tag{display:inline-block;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.15em;padding:5px 14px;border-radius:100px;margin-bottom:14px;position:relative;}
.camp-s{background:var(--accent-s-light);color:var(--accent-s);}
.camp-m{background:var(--accent-m-light);color:var(--accent-m);}
.camp-hidden{background:var(--surface2);color:var(--text-muted);}
.result-name{font-size:clamp(30px,8vw,44px);font-weight:900;letter-spacing:-.02em;line-height:1.1;margin-bottom:6px;position:relative;}
.result-name-zh{font-size:15px;color:var(--text-muted);margin-bottom:4px;position:relative;}
.result-name-en{font-family:'Space Mono',monospace;font-size:11px;color:var(--text-dim);letter-spacing:.12em;margin-bottom:28px;position:relative;}
.result-divider{height:1px;background:var(--border);margin:24px 0;}
.result-desc{font-size:14px;line-height:2.1;color:var(--text-muted);white-space:pre-line;text-align:left;}
.dims-card{background:var(--surface);border-radius:24px;padding:28px;margin-bottom:16px;box-shadow:var(--shadow);border:1px solid var(--border);}
.section-title{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.22em;color:var(--text-dim);text-transform:uppercase;margin-bottom:24px;text-align:center;}
.dims-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.dim-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;}
.dim-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.dim-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted);letter-spacing:.08em;}
.dim-val{font-family:'Space Mono',monospace;font-size:11px;color:var(--text-dim);}
.dim-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:10px;overflow:hidden;}
.dim-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent-s),var(--accent-m));transition:width 1.2s cubic-bezier(.4,0,.2,1) .2s;}
.dim-desc{font-size:11px;color:var(--text-muted);line-height:1.6;}
.share-card{background:var(--surface);border-radius:24px;padding:28px;margin-bottom:12px;text-align:center;box-shadow:var(--shadow);border:1px solid var(--border);}
.share-text{font-size:15px;color:var(--text-muted);line-height:1.9;margin-bottom:20px;}
.share-text em{color:var(--accent-s);font-style:normal;font-weight:700;}
.share-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;}
.btn-share{padding:10px 20px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:100px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;color:var(--text-muted);cursor:pointer;transition:all .2s;}
.btn-share:hover{border-color:var(--text-muted);color:var(--text);}
.btn-retry{width:100%;padding:16px;background:transparent;border:1.5px solid var(--border2);border-radius:var(--radius);font-family:'Noto Serif SC',serif;font-size:14px;color:var(--text-muted);cursor:pointer;transition:all .2s;}
.btn-retry:hover{border-color:var(--text);color:var(--text);}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--text);color:var(--bg);padding:10px 22px;border-radius:100px;font-family:'Space Mono',monospace;font-size:11px;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.95)}}
@keyframes loadAnim{from{width:0}to{width:100%}}
@keyframes floatUp{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.fade-up{animation:fadeUp .6s ease forwards;}
@media(max-width:480px){.dims-grid{grid-template-columns:1fr}.result-hero{padding:32px 20px 28px}}
</style>
</head>
<body>

<!-- INTRO -->
<div class="screen active" id="intro">
  <div class="intro-deco"></div>
  <div class="intro-content fade-up">
    <div class="badge">S · M · T · I</div>
    <div class="intro-title"><span class="title-s">S</span><span class="title-m">M</span><span class="title-ti">TI</span></div>
    <div class="intro-tagline" style="margin-top:10px">你在感情里是哪种生物</div>
    <div class="intro-card">
      <p>不是星座，不是血型，不是MBTI。<br><br>
      <strong>14个问题</strong>，6个维度，测出你在关系里真实的运作方式。<br><br>
      结果可能让你觉得被看穿——也可能让你第一次看清自己。</p>
    </div>
    <div class="stats-row">
      <div class="stat"><span class="stat-num">14</span><span class="stat-label">道题</span></div>
      <div class="stat"><span class="stat-num">6</span><span class="stat-label">个维度</span></div>
      <div class="stat"><span class="stat-num">16</span><span class="stat-label">种结果</span></div>
      <div class="stat"><span class="stat-num">4</span><span class="stat-label">个隐藏</span></div>
    </div>
    <button class="btn-start" onclick="startQuiz()">开始测试 →</button>
    <div class="disclaimer">约 3 分钟 · 凭直觉选 · 没有标准答案</div>
  </div>
</div>

<!-- QUIZ -->
<div class="screen" id="quiz">
  <div class="quiz-top-bar">
    <div class="progress-meta">
      <span class="progress-label" id="progress-text">已完成 0 / 14 题</span>
      <span class="progress-label" id="progress-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  </div>
  <div class="quiz-scroll-body" id="quiz-body"></div>
  <div class="submit-zone">
    <div class="submit-hint" id="submit-hint">还有 14 题未完成</div>
    <button class="btn-submit" id="btn-submit" onclick="trySubmit()" disabled>查看我的结果 →</button>
  </div>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="loading-emoji" id="loading-emoji">🔬</div>
  <div class="loading-text" id="loading-text">正在分析你的答案</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="result-inner">
    <div class="result-eyebrow">你的 SMTI 结果</div>
    <div class="result-hero">
      <div class="hero-gradient"></div>
      <div class="hero-top-bar"></div>
      <div class="hidden-badge" id="hidden-badge" style="display:none">✦ 隐藏类型 · 稀有解锁</div>
      <div class="char-illus" id="char-illus"></div>
      <div class="result-camp-tag" id="result-camp"></div>
      <div class="result-name" id="result-name"></div>
      <div class="result-name-zh" id="result-name-zh"></div>
      <div class="result-name-en" id="result-name-en"></div>
      <div class="result-divider"></div>
      <div class="result-desc" id="result-desc"></div>
    </div>
    <div class="dims-card">
      <div class="section-title">你的六维度画像</div>
      <div class="dims-grid" id="dims-grid"></div>
    </div>
    <div class="share-card">
      <div class="section-title">分享给朋友</div>
      <div class="share-text">我的 SMTI 结果是 <em id="share-name"></em><br>你猜你在感情里是哪种生物？</div>
      <div class="share-btns">
        <button class="btn-share" onclick="copyResult()">复制结果文字</button>
        <button class="btn-share" onclick="copyLink()">复制测试链接</button>
      </div>
    </div>
    <button class="btn-retry" onclick="resetQuiz()">重新测一次</button>
  </div>
</div>

<div class="toast" id="toast"></div>

const chars=[
{id:'starbucks',name:'Starbucks',zh:'那个让你排队还觉得值的',en:'STARBUCKS',camp:'S 阵营',cc:'camp-s',h:false,p:{C:1,A:1,T:2,E:1,W:1,D:1},desc:`你不是难搞，你只是有点贵。\n不是所有人都配排那个队，你心里清楚。\n偶尔你也想过要不要平易近人一点——\n然后你点了一杯最复杂的定制饮品，继续等。\n有些人天生就不打折。`},
{id:'santa',name:'Santa',zh:'圣诞老人（胖胖版）',en:'SANTA CLAUS',camp:'S 阵营',cc:'camp-s',h:false,p:{C:1,A:1,T:1,E:1,W:1,D:2},desc:`你不联系任何人。\n但你知道所有人在干什么。\n你有一个名单，上面写着谁值得，谁不值得。\n全世界都在等你出现，你按自己的节奏来。\n一年就那么一次——但所有人都记得。\n你从不解释自己为什么来，也不解释为什么不来。\n礼物给不给，你说了算。`},
{id:'snape',name:'Snape',zh:'斯内普教授（always那个）',en:'SEVERUS SNAPE',camp:'S 阵营',cc:'camp-s',h:false,p:{C:1,A:3,T:2,E:1,W:2,D:2},desc:`你爱一个人的方式，\n是让他永远不知道你在爱他。\n帮了八百次忙，嘴上说「跟我没关系」。\n保护了无数次，从不要求任何回报。\n有人说你冷漠，你没有解释。\n解释这件事，本身就不是你的风格。\n总有一天他会懂的——\n你只是不确定，那一天你还在不在。`},
{id:'shrek',name:'Shrek',zh:'史莱克（沼泽有主，请勿擅入）',en:'SHREK',camp:'S 阵营',cc:'camp-s',h:false,p:{C:2,A:2,T:2,E:2,W:3,D:3},desc:`你有自己的沼泽。\n不是不让人进来，是你不主动开门。\n但进来过的人都知道——\n里面比外面想象的温暖太多。\n你只是不擅长说「欢迎」，\n所以大多数人在门口就走了。\n你看着他们走，没有追。\n但你记得每一个敲过门的人。`},
{id:'spongebob',name:'SpongeBob',zh:'海绵宝宝（比奇堡的快乐是真实的）',en:'SPONGEBOB SQUAREPANTS',camp:'S 阵营',cc:'camp-s',h:false,p:{C:2,A:1,T:2,E:3,W:4,D:3},desc:`你对所有人都很好，\n但「很好」不等于「需要」。\n你的快乐是真实的，\n只是那个快乐跟他没有太大关系。\n你有自己的比奇堡，\n有小蜗，有蟹黄堡，有自己的节奏。\n他以为自己很了解你——\n你礼貌地笑了笑。\n小蜗在旁边也笑了笑。`},
{id:'squidward',name:'Squidward',zh:'章鱼哥（我在等世界欣赏我）',en:'SQUIDWARD TENTACLES',camp:'S 阵营',cc:'camp-s',h:false,p:{C:1,A:1,T:3,E:2,W:2,D:1},desc:`你不是孤僻，你只是对「群」有要求。\n不是所有热闹都值得你参与，\n不是所有人都值得你回消息。\n你有自己的审美，自己的品味，自己的音乐。\n周围人不懂，你也不打算解释。\n总有一天世界会欣赏你的——\n你非常坚定地相信这一点，\n已经相信很多年了。`},
{id:'muji',name:'MUJI',zh:'无印良品',en:'MUJI 無印良品',camp:'M 阵营',cc:'camp-m',h:false,p:{C:4,A:2,T:3,E:1,W:3,D:2},desc:`你是那种会在分手三个月后，\n突然想起对方说过的一句无关紧要的话，\n然后在凌晨两点盯着天花板的人。\n你没有告诉任何人。\n你不觉得这有什么好说的。\n你的需求感不是没有，\n是存在一个很深的地方，\n深到连你自己都要挖一会儿才能找到。\n无印良品的包装上从来不写成分，\n但成分都在。`},
{id:'mcdonalds',name:"McDonald's",zh:'麦当劳（24小时为你开着）',en:"McDONALD'S",camp:'M 阵营',cc:'camp-m',h:false,p:{C:4,A:4,T:2,E:3,W:3,D:4},desc:`你是那种让人无比安心的存在。\n不管几点，不管什么心情，找你都不会错。\n你24小时营业，风雨无阻，从不让人失望。\n你也知道，\n「随时都在」这件事，\n让你显得不那么珍贵。\n但你还是开着门。\n因为你觉得，\n有人需要你这件事，本身就足够了。`},
{id:'marco',name:'Marco 马可',zh:'马可波罗（翻山越岭版）',en:'MARCO POLO',camp:'M 阵营',cc:'camp-m',h:false,p:{C:4,A:4,T:2,E:3,W:4,D:5},desc:`你愿意为一个人翻山越岭。\n不是因为他要求你，\n是因为你根本停不下来。\n对方问你累不累，你说不累。\n你是真的不累——\n因为只要在靠近他，\n你就觉得这趟值得。\n你没说的是：\n你从来没想过，\n他有没有在等你到来。`},
{id:'minions',name:'Minions',zh:'小黄人（存包小票找不到版）',en:'MINIONS',camp:'M 阵营',cc:'camp-m',h:false,p:{C:5,A:4,T:3,E:4,W:5,D:5},desc:`你天生需要一个可以追随的人。\n不是因为你没主见——\n是因为你的主见就是：跟他走。\n找到之前，你是全世界最散漫的人。\n找到之后，你是全世界最专注的人。\n旁人觉得你傻，\n你觉得旁人不懂——\n爱一个人本来就是把判断力暂时寄存一下。\n问题是你的存包小票，\n一直找不到在哪。`},
{id:'morty',name:'Morty',zh:'莫蒂（你又犯病了）',en:'MORTY SMITH',camp:'M 阵营',cc:'camp-m',h:false,p:{C:5,A:5,T:4,E:4,W:4,D:5},desc:`你也知道跟着他走不一定对。\n你也知道这段关系有点消耗你。\n你也知道你值得更好的。\n但他一开口，\n你就已经在穿外套了。\n你把这叫做缘分。\n你最好的朋友叫它：你又犯病了。\n你们说的可能是同一件事。`},
{id:'malo',name:'Malo 吗喽',zh:'吗喽（用香蕉的钱只能请来我）',en:'MALO',camp:'M 阵营',cc:'camp-m',h:false,p:{C:5,A:5,T:5,E:3,W:3,D:5},desc:`生活给了你很多下马威，你照单全收。\n感情给了你很多措手不及，你也照单全收。\n每次以为真的撑不住了，\n结果第二天闹钟一响，\n你还是爬起来了。\n不是因为你坚强——\n是因为你蹲着比站着更难受。\n你不是没有脾气，\n你只是发完了还得继续过日子。\n这件事你已经很熟练了。`},
{id:'switch',name:'Switch',zh:'任天堂Switch（看和谁玩）',en:'NINTENDO SWITCH',camp:'隐藏类型',cc:'camp-hidden',h:true,p:{C:3,A:3,T:3,E:3,W:3,D:3},desc:`你在不同关系里呈现出完全不同的自己。\n有时候主导，有时候跟随，切换得行云流水。\n掌机模式、主机模式、多人联机模式——\n全都是你，全都真实。\n有人说你善变，\n你想了想，觉得他们说得不对——\n但你也没办法解释哪里不对。\n别人问你到底是哪种人，\n你想了想：\n看和谁玩。`},
{id:'schrodinger',name:'Schrödinger',zh:'薛定谔（对，那个猫的定律）',en:'SCHRÖDINGER',camp:'隐藏类型',cc:'camp-hidden',h:true,p:{C:3,A:4,T:3,E:2,W:5,D:3},desc:`你同时喜欢他又不喜欢他，\n同时想靠近又想逃。\n你跟自己说「再看看」已经说了两年了。\n在他观测你之前，\n你永远两种状态都是真的——\n这不叫纠结，\n这叫量子态恋爱。\n物理学家用一生研究这个问题，\n你每天都在亲身实践。`},
{id:'murphy',name:'Murphy',zh:'墨菲（对，那个定律）',en:"MURPHY'S LAW",camp:'隐藏类型',cc:'camp-hidden',h:true,p:{C:4,A:5,T:5,E:3,W:3,D:4},desc:`你也不知道为什么，\n感情里的倒霉事总爱找你。\n明明付出了很多，结果总差那么一口气。\n明明没做错什么，就是走了麦城。\n有人说你命不好，\n你想说不是——\n但想了半天，\n也没想出更好的解释。\n不过你每次都站起来了。\n这件事本身，\n已经比大多数人做得好了。`},
{id:'muscle',name:'Muscle',zh:'健身房终极M之神（力竭还多做了两个版）',en:'MUSCLE',camp:'隐藏类型',cc:'camp-hidden',h:true,p:{C:2,A:2,T:1,E:2,W:1,D:2},desc:`没有人逼你的。\n是你自己订了早六点的课，\n是你自己加的重量，\n是你自己做到力竭还多做了两个。\n练完躺在地上觉得快死了，\n但第二天你还是来了。\n你不觉得这是受苦——\n你觉得这叫热爱。\n感情里也是一样，\n你永远比任何人都清楚自己在干什么。\n只是有时候，\n清楚和停下来，是两件事。`}
];

const qs=[
{t:"你和一个人聊了三个月天，从早聊到晚，话题从星座聊到人生意义，从外卖选什么聊到死后去哪里。有一天他突然三小时没回你消息。你怎么了？",o:[{t:"没怎么，他可能在忙",s:{A:1,T:1,W:1}},{t:"开始在脑子里把过去三个月重新过了一遍",s:{a:1,t:1,w:1}},{t:"也没回他，但刷了一下他朋友圈",s:{C:1,E:1,W:1}}]},
{t:"你的恋爱对象是一个对你温柔体贴、从不发脾气、你说什么都说好、你去哪里都愿意跟、你难过他比你还难过、你开心他比你还开心、简直像为你量身定制的完美人类。此时你会？",o:[{t:"这不就是我要的吗，很好",s:{a:1,D:1,T:1}},{t:"怎么感觉有点无聊",s:{C:1,A:1,d:1}},{t:"欣赏，但不知道为什么提不起劲",s:{A:1,E:1,W:1}}]},
{t:"科学家研究发现，人在感情里表现出的「冷淡」，有87.6%的概率其实是在等对方先开口。剩下12.4%是真的冷淡。你属于哪种？",o:[{t:"87.6%那个",s:{a:1,e:1,w:1}},{t:"12.4%那个",s:{C:1,A:1,W:1}},{t:"我是那个导致这个数据偏差的人",s:{C:1,W:1,d:1},h:'ss'}]},
{t:"你喜欢一个人，但你从来没说过。你们就这样不远不近相处了很久。有一天他问你：「你对我是什么感觉？」你当时心跳加速，但你说出口的是？",o:[{t:"就普通朋友啊",s:{C:1,E:1,A:1}},{t:"什么感觉？什么意思？",s:{A:1,w:1,d:1}},{t:"你问这个干嘛",s:{C:1,A:1,d:1}},{t:"「我喜欢你」——然后立刻后悔发出去了",s:{a:1,e:1,t:1}}]},
{t:"你暗恋一个人暗恋了很久。某天你鼓起勇气约他出来，他说：「好啊，那天我还约了另一个朋友，他们可以一起来吗？」你当下的心情是？",o:[{t:"没关系，多个人也挺好",s:{T:1,a:1,D:1}},{t:"有一点点失落，但表现正常",s:{E:1,T:1,W:1}},{t:"那算了，改天吧",s:{C:1,A:1,d:1}},{t:"好，但我记住了",s:{C:1,E:1,W:1}}]},
{t:"你们吵架了。原因是你说了一句话，你觉得完全没问题，但对方觉得你在攻击他。你解释了三遍，他还是觉得你在攻击他。你现在？",o:[{t:"那就道歉，解释不清楚就算了",s:{t:1,a:1,D:1}},{t:"继续解释，一定要讲清楚",s:{C:1,d:1,W:1}},{t:"好，那你赢了",s:{C:1,E:1,T:1},h:'mu'}]},
{t:"你朋友跟你说，他喜欢上了一个人，但对方对他时好时坏——有时候秒回，有时候三天不读；有时候主动找他，有时候消失一周。他完全不知道对方什么意思，但就是戒不掉。你听完觉得？",o:[{t:"这人不喜欢他，赶紧跑",s:{C:1,d:1,W:1}},{t:"也许对方只是比较忙",s:{a:1,T:1,D:1}},{t:"懂，而且我现在就在经历",s:{a:1,t:1,w:1},h:'mu'}]},
{t:"你暗恋的人深夜突然发来一条消息：「你有没有觉得，咱们之间有种说不清楚的感觉？」你激动地打出一大段话，手指悬在发送键上。此时你备忘录里已经有这段话的第十七个版本。你最终发出去的是？",o:[{t:"第十七版，改到最好才发",s:{C:1,E:1,d:1}},{t:"删掉，回了个「哈哈怎么了」",s:{A:1,E:1,T:1}},{t:"直接打电话，说不清楚就打电话",s:{e:1,D:1,W:1}},{t:"关掉手机，睡觉，但睁眼到天亮",s:{a:1,t:1,E:1},h:'mu'}]},
{t:"有一种人，在关系里永远是那个先低头的，先道歉的，先打破冷战的，先说「算了我不生气了」的，先问「你吃了吗」的。你觉得这种人是？",o:[{t:"很好，我喜欢这样的人",s:{C:1,A:1,d:1}},{t:"有点可怜",s:{C:1,W:1,d:1}},{t:"是我",s:{a:1,e:1,t:1},h:'mu'}]},
{t:"如果你在感情里的状态是一种天气，你现在是？",o:[{t:"晴天——稳定，没什么波澜，也挺好",s:{T:1,A:1,W:1}},{t:"梅雨季——说不清楚，一直在等什么结束",s:{a:1,t:1,w:1}},{t:"台风前——表面平静，但感觉快来了",s:{C:1,E:1,T:1}},{t:"人工智能控制的恒温室——我不确定我有没有天气",s:{w:1,d:1},h:'ss'}]},
{t:"你跟一个人在一起半年了。有天你突然发现，你已经不记得不认识他之前是什么感觉了。你对这件事的态度是？",o:[{t:"这挺好的，我喜欢这种感觉",s:{a:1,D:1,T:1}},{t:"有点细思极恐，但又不想想太多",s:{E:1,W:1,d:1}},{t:"没想过这个问题",s:{A:1,w:1,T:1}}]},
{t:"在感情里，你是那种会先爱上对方的人，还是等对方先爱上你的人？",o:[{t:"我先爱的那个",s:{a:1,D:1,e:1}},{t:"等对方先爱我的那个",s:{C:1,A:1,d:1}},{t:"说不清楚，要看对方",s:{w:1},h:'sw'},{t:"我还没想好这个问题",s:{w:1,a:1},h:'sc'}]},
{t:"你们在一起之后，你发现对方喜欢你的理由，恰好是你最不在意的那部分自己。",o:[{t:"那也没关系，喜欢就是喜欢",s:{T:1,D:1,a:1}},{t:"有点奇怪，他喜欢的到底是不是真正的我",s:{W:1,d:1,E:1}},{t:"所以有时候我会想，他喜欢的是我吗",s:{w:1,a:1,t:1}}]},
{t:"如果对方有一天问你：「你有没有认真喜欢过我？」你回答的时候，会先想什么？",o:[{t:"当然有，脱口而出",s:{e:1,D:1,T:1}},{t:"想了想，还是说「当然有」",s:{W:1,E:1,d:1}},{t:"想起某个具体的瞬间，然后才说有",s:{D:1,W:1,a:1}},{t:"反问他为什么突然问这个",s:{C:1,A:1,d:1}}]}
];

let ans=new Array(qs.length).fill(null);

function startQuiz(){showScreen('quiz');buildQuiz();}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('loading').classList.remove('active');
  if(id==='loading')document.getElementById('loading').classList.add('active');
  else{document.getElementById(id).classList.add('active');window.scrollTo(0,0);}
}

function buildQuiz(){
  const body=document.getElementById('quiz-body');
  body.innerHTML='';
  const L=['A','B','C','D'];
  qs.forEach((q,qi)=>{
    const block=document.createElement('div');
    block.className='q-block';
    block.id='qb'+qi;
    const opts=q.o.map((o,i)=>`<button class="option${ans[qi]===i?' selected':''}" onclick="pick(${qi},${i})"><span class="opt-letter">${L[i]}</span><span>${o.t}</span></button>`).join('');
    block.innerHTML=`<div class="q-num">Q ${String(qi+1).padStart(2,'0')}</div><div class="q-text">${q.t}</div><div class="options">${opts}</div>`;
    body.appendChild(block);
  });
  updateUI();
}

function pick(qi,i){
  ans[qi]=i;
  const block=document.getElementById('qb'+qi);
  block.querySelectorAll('.option').forEach((el,idx)=>el.classList.toggle('selected',idx===i));
  block.classList.remove('unanswered');
  updateUI();
}

function updateUI(){
  const done=ans.filter(a=>a!==null).length;
  const rem=qs.length-done;
  const pct=Math.round(done/qs.length*100);
  document.getElementById('progress-text').textContent=`已完成 ${done} / ${qs.length} 题`;
  document.getElementById('progress-pct').textContent=pct+'%';
  document.getElementById('progress-fill').style.width=pct+'%';
  const btn=document.getElementById('btn-submit');
  const hint=document.getElementById('submit-hint');
  if(rem===0){btn.disabled=false;hint.textContent='';}
  else{btn.disabled=true;hint.textContent=`还有 ${rem} 题未完成`;}
}

function trySubmit(){
  const missing=ans.map((a,i)=>a===null?i:-1).filter(i=>i>=0);
  if(missing.length>0){
    missing.forEach(qi=>document.getElementById('qb'+qi).classList.add('unanswered'));
    document.getElementById('qb'+missing[0]).scrollIntoView({behavior:'smooth',block:'center'});
    document.getElementById('submit-hint').textContent=`还有 ${missing.length} 题未完成，已为你标出 ↑`;
    return;
  }
  doResult();
}

function calcScores(){
  let r={C:0,A:0,T:0,E:0,W:0,D:0};
  ans.forEach((a,qi)=>{
    if(a===null)return;
    Object.entries(qs[qi].o[a].s).forEach(([k,v])=>{
      const d=k.toUpperCase();
      if(k===k.toUpperCase())r[d]-=v;else r[d]+=v;
    });
  });
  const out={};
  Object.keys(r).forEach(d=>{out[d]=Math.max(1,Math.min(5,3+r[d]));});
  return out;
}

function detectHidden(sc){
  let t={sw:0,sc:0,mu:0,ms:0};
  ans.forEach((a,qi)=>{
    if(a===null)return;
    const h=qs[qi].o[a].h;
    if(!h)return;
    if(h==='ss'){t.sw++;t.sc++;}
    else if(h==='sw')t.sw++;
    else if(h==='sc')t.sc++;
    else if(h==='mu')t.mu++;
    else if(h==='ms')t.ms++;
  });
  if(t.mu>=2)return'murphy';
  if(t.ms>=2)return'muscle';
  if(t.sc>=2)return'schrodinger';
  if(t.sw>=2&&Math.abs(sc.C-3)<=1&&Math.abs(sc.A-3)<=1)return'switch';
  return null;
}

function doResult(){
  showScreen('loading');
  const msgs=['正在分析你的答题模式…','计算六维度画像…','匹配最近邻角色…','结果即将揭晓…'];
  const emo=['🔬','📊','🧠','✨'];
  let mi=0;
  const iv=setInterval(()=>{mi++;if(mi<msgs.length){document.getElementById('loading-text').textContent=msgs[mi];document.getElementById('loading-emoji').textContent=emo[mi];}},500);
  setTimeout(()=>{
    clearInterval(iv);
    const sc=calcScores();
    const hid=detectHidden(sc);
    const char=hid?chars.find(c=>c.id===hid):chars.filter(c=>!c.h).reduce((b,c)=>{
      const d=Math.sqrt(Object.keys(sc).reduce((s,k)=>s+Math.pow(sc[k]-(c.p[k]||3),2),0));
      return!b||d<b.d?{c,d}:{c:b.c,d:b.d};
    },{c:null,d:Infinity}).c;
    renderResult(char,sc);
    showScreen('result');
  },2200);
}

function renderResult(char,sc){
  document.getElementById('char-illus').innerHTML=illus[char.id]||char.zh;
  document.getElementById('hidden-badge').style.display=char.h?'inline-block':'none';
  const ce=document.getElementById('result-camp');
  ce.textContent=char.camp;ce.className='result-camp-tag '+char.cc;
  document.getElementById('result-name').textContent=char.name;
  document.getElementById('result-name-zh').textContent=char.zh;
  document.getElementById('result-name-en').textContent=char.en;
  document.getElementById('result-desc').textContent=char.desc;
  document.getElementById('share-name').textContent=char.name;
  const grid=document.getElementById('dims-grid');
  grid.innerHTML='';
  Object.keys(dimL).forEach(d=>{
    const v=sc[d]||3,pct=((v-1)/4)*100,desc=v<=2.5?dimD[d].low:dimD[d].high;
    const el=document.createElement('div');
    el.className='dim-item';
    el.innerHTML=`<div class="dim-header"><span class="dim-label">${dimL[d]}</span><span class="dim-val">${v.toFixed(1)}</span></div><div class="dim-bar"><div class="dim-fill" style="width:0%" data-p="${pct}"></div></div><div class="dim-desc">${desc}</div>`;
    grid.appendChild(el);
  });
  setTimeout(()=>document.querySelectorAll('.dim-fill').forEach(el=>el.style.width=el.dataset.p+'%'),150);
}

function copyResult(){
  const n=document.getElementById('result-name').textContent;
  const z=document.getElementById('result-name-zh').textContent;
  navigator.clipboard.writeText(`我的 SMTI 测试结果是 ${n}（${z}）\n你在感情里是哪种生物？来测测看 →`).then(()=>toast('已复制 ✓'));
}
function copyLink(){navigator.clipboard.writeText(window.location.href).then(()=>toast('链接已复制 ✓'));}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function resetQuiz(){ans=new Array(qs.length).fill(null);showScreen('intro');}
</script>
